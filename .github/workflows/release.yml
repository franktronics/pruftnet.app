name: Release

on:
    push:
        tags:
            - 'v*'

permissions:
    contents: write

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    # Validate changelog has entry for this version
    validate-changelog:
        name: Validate Changelog
        runs-on: ubuntu-24.04
        outputs:
            release_notes: ${{ steps.extract.outputs.notes_file }}
        steps:
            - name: Checkout
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Validate changelog structure
              run: |
                  if [ ! -f CHANGELOG.md ]; then
                    echo "::error::CHANGELOG.md not found"
                    exit 1
                  fi
                  if ! grep -q "^# Changelog" CHANGELOG.md; then
                    echo "::error::CHANGELOG.md must start with '# Changelog'"
                    exit 1
                  fi
                  if ! grep -qE "^## \[[0-9]+\.[0-9]+\.[0-9]+\]" CHANGELOG.md; then
                    echo "::error::CHANGELOG.md must contain at least one version entry (## [x.y.z])"
                    exit 1
                  fi
                  echo "Changelog structure is valid"

            - name: Extract release notes
              id: extract
              run: |
                  VERSION="${{ github.ref_name }}"
                  VERSION_NO_V="${VERSION#v}"
                  echo "Looking for version: ${VERSION_NO_V}"
                  if ! grep -q "^## \[${VERSION_NO_V}\]" CHANGELOG.md; then
                    echo "::error::No changelog entry found for version ${VERSION_NO_V}"
                    echo "::error::Please add a '## [${VERSION_NO_V}]' section to CHANGELOG.md before releasing"
                    exit 1
                  fi
                  awk "/^## \[${VERSION_NO_V}\]/{found=1; next} /^## \[/{if(found) exit} found{print}" CHANGELOG.md > release_notes.md
                  if [ ! -s release_notes.md ]; then
                    echo "::error::Changelog entry for version ${VERSION_NO_V} is empty"
                    exit 1
                  fi
                  echo "Release notes extracted successfully:"
                  cat release_notes.md

            - name: Upload release notes
              uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
              with:
                  name: release-notes
                  path: release_notes.md
                  if-no-files-found: error

    # Build desktop app — one job per OS/arch combination
    build-desktop:
        name: Desktop (${{ matrix.name }})
        needs: [validate-changelog]
        runs-on: ${{ matrix.runner }}
        strategy:
            fail-fast: false
            matrix:
                include:
                    # ── Linux ──────────────────────────────────────────────
                    - name: linux-x64
                      runner: ubuntu-24.04
                      os: linux
                      arch: x64
                      system_deps: sudo apt-get update && sudo apt-get install -y cmake libpcap-dev

                    - name: linux-arm64
                      runner: ubuntu-24.04-arm
                      os: linux
                      arch: arm64
                      system_deps: sudo apt-get update && sudo apt-get install -y cmake libpcap-dev

                    # ── macOS ──────────────────────────────────────────────
                    # macos-13  = Intel x64
                    # macos-14  = Apple Silicon arm64
                    - name: mac-x64
                      runner: macos-13
                      os: darwin
                      arch: x64
                      system_deps: brew install cmake libpcap

                    - name: mac-arm64
                      runner: macos-14
                      os: darwin
                      arch: arm64
                      system_deps: brew install cmake libpcap

                    # ── Windows ────────────────────────────────────────────
                    # WinPcap/Npcap SDK must be present to build the C++ core.
                    # We download the Npcap SDK and point cmake-js at it via env.
                    - name: win-x64
                      runner: windows-latest
                      os: win32
                      arch: x64
                      system_deps: ''

                    - name: win-arm64
                      runner: windows-11-arm
                      os: win32
                      arch: arm64
                      system_deps: ''

        steps:
            - name: Checkout
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Install system dependencies (Linux / macOS)
              if: matrix.os != 'win32' && matrix.system_deps != ''
              run: ${{ matrix.system_deps }}

            - name: Download Npcap SDK (Windows)
              if: matrix.os == 'win32'
              shell: pwsh
              run: |
                  Invoke-WebRequest -Uri "https://npcap.com/dist/npcap-sdk-1.13.zip" -OutFile npcap-sdk.zip
                  Expand-Archive npcap-sdk.zip -DestinationPath C:\npcap-sdk
                  echo "NPCAP_SDK=C:\npcap-sdk" >> $env:GITHUB_ENV

            - name: Setup pnpm
              uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0

            - name: Setup Node.js
              uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
              with:
                  node-version: 22
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build C++ core
              run: pnpm build:core

            - name: Generate Prisma client
              run: pnpm --filter @repo/core-node prisma generate

            - name: Rebuild native modules for Electron
              run: pnpm -F @repo/desktop run rebuild

            - name: Build Electron app
              run: pnpm -F @repo/desktop run make

            # ── Upload artifacts per platform ──────────────────────────────

            - name: Upload .deb (Linux)
              if: matrix.os == 'linux'
              uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
              with:
                  name: desktop-deb-${{ matrix.arch }}
                  path: apps/desktop/out/make/deb/${{ matrix.arch }}/*.deb
                  if-no-files-found: error

            - name: Upload .zip (Linux / macOS)
              if: matrix.os != 'win32'
              uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
              with:
                  name: desktop-zip-${{ matrix.name }}
                  path: apps/desktop/out/make/zip/${{ matrix.os }}/${{ matrix.arch }}/*.zip
                  if-no-files-found: error

            - name: Upload .exe (Windows)
              if: matrix.os == 'win32'
              uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
              with:
                  name: desktop-win-${{ matrix.arch }}
                  path: apps/desktop/out/make/squirrel.windows/${{ matrix.arch }}/*.exe
                  if-no-files-found: error

    # Build the standalone server (Linux only — server targets)
    build-server:
        name: Server (${{ matrix.name }})
        needs: [validate-changelog]
        runs-on: ${{ matrix.runner }}
        strategy:
            fail-fast: false
            matrix:
                include:
                    - name: linux-x64
                      runner: ubuntu-24.04
                      arch: x64

                    - name: linux-arm64
                      runner: ubuntu-24.04-arm
                      arch: arm64

        steps:
            - name: Checkout
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Install system dependencies
              run: |
                  sudo apt-get update
                  sudo apt-get install -y cmake libpcap-dev

            - name: Setup pnpm
              uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0

            - name: Setup Node.js
              uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
              with:
                  node-version: 22
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build C++ core
              run: pnpm build:core

            - name: Generate Prisma client
              run: pnpm --filter @repo/core-node prisma generate

            - name: Build and package server
              run: pnpm -F @repo/web run package

            - name: Upload server artifact
              uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
              with:
                  name: server-${{ matrix.arch }}
                  path: apps/web/dist/*.tar.gz
                  if-no-files-found: error

    # Create GitHub Release and attach all artifacts
    release:
        name: Create Release
        runs-on: ubuntu-24.04
        needs: [validate-changelog, build-desktop, build-server]
        steps:
            - name: Download release notes
              uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
              with:
                  name: release-notes

            - name: Download all build artifacts
              uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
              with:
                  path: artifacts
                  pattern: '!(release-notes)'

            - name: List artifacts
              run: find artifacts -type f

            - name: Create Release
              uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
              with:
                  draft: false
                  prerelease: ${{ contains(github.ref, '-') }}
                  body_path: release_notes.md
                  files: |
                      artifacts/desktop-deb-x64/*.deb
                      artifacts/desktop-deb-arm64/*.deb
                      artifacts/desktop-zip-linux-x64/*.zip
                      artifacts/desktop-zip-linux-arm64/*.zip
                      artifacts/desktop-zip-mac-x64/*.zip
                      artifacts/desktop-zip-mac-arm64/*.zip
                      artifacts/desktop-win-x64/*.exe
                      artifacts/desktop-win-arm64/*.exe
                      artifacts/server-x64/*.tar.gz
                      artifacts/server-arm64/*.tar.gz
