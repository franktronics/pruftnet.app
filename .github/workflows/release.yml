name: Release

on:
    push:
        tags:
            - 'v*'

permissions:
    contents: write

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    # Validate changelog has entry for this version
    validate-changelog:
        name: Validate Changelog
        runs-on: ubuntu-24.04
        outputs:
            release_notes: ${{ steps.extract.outputs.notes_file }}
        steps:
            - name: Checkout
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Validate changelog structure
              run: |
                  # Check CHANGELOG.md exists
                  if [ ! -f CHANGELOG.md ]; then
                    echo "::error::CHANGELOG.md not found"
                    exit 1
                  fi

                  # Check header exists
                  if ! grep -q "^# Changelog" CHANGELOG.md; then
                    echo "::error::CHANGELOG.md must start with '# Changelog'"
                    exit 1
                  fi

                  # Check at least one version entry exists
                  if ! grep -qE "^## \[[0-9]+\.[0-9]+\.[0-9]+\]" CHANGELOG.md; then
                    echo "::error::CHANGELOG.md must contain at least one version entry (## [x.y.z])"
                    exit 1
                  fi

                  echo "Changelog structure is valid"

            - name: Extract release notes
              id: extract
              run: |
                  VERSION="${{ github.ref_name }}"
                  VERSION_NO_V="${VERSION#v}"

                  echo "Looking for version: ${VERSION_NO_V}"

                  # Check if version exists in changelog
                  if ! grep -q "^## \[${VERSION_NO_V}\]" CHANGELOG.md; then
                    echo "::error::No changelog entry found for version ${VERSION_NO_V}"
                    echo "::error::Please add a '## [${VERSION_NO_V}]' section to CHANGELOG.md before releasing"
                    exit 1
                  fi

                  # Extract the section for this version (from ## [version] to next ## [ or end of file)
                  awk "/^## \[${VERSION_NO_V}\]/{found=1; next} /^## \[/{if(found) exit} found{print}" CHANGELOG.md > release_notes.md

                  # Check if release notes are not empty
                  if [ ! -s release_notes.md ]; then
                    echo "::error::Changelog entry for version ${VERSION_NO_V} is empty"
                    exit 1
                  fi

                  echo "Release notes extracted successfully:"
                  cat release_notes.md

            - name: Upload release notes
              uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
              with:
                  name: release-notes
                  path: release_notes.md
                  if-no-files-found: error

    # Build the Electron desktop app
    build-desktop:
        name: Build Desktop (${{ matrix.arch }})
        runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-24.04' }}
        needs: [validate-changelog]
        strategy:
            fail-fast: false
            matrix:
                arch: [x64, arm64]
        steps:
            - name: Checkout
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Install system dependencies
              run: |
                  sudo apt-get update
                  sudo apt-get install -y cmake libpcap-dev

            - name: Setup pnpm
              uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0

            - name: Setup Node.js
              uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
              with:
                  node-version: 22
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build C++ core
              run: pnpm build:core

            - name: Generate Prisma client
              run: pnpm --filter @repo/core-node prisma generate

            - name: Rebuild native modules for Electron
              run: pnpm -F @repo/desktop run rebuild

            - name: Build Electron app
              run: pnpm -F @repo/desktop run make

            - name: Upload .deb artifact
              uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
              with:
                  name: desktop-deb-${{ matrix.arch }}
                  path: apps/desktop/out/make/deb/${{ matrix.arch }}/*.deb
                  if-no-files-found: error

            - name: Upload .zip artifact
              uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
              with:
                  name: desktop-zip-${{ matrix.arch }}
                  path: apps/desktop/out/make/zip/linux/${{ matrix.arch }}/*.zip
                  if-no-files-found: error

    # Build the standalone server
    build-server:
        name: Build Server (${{ matrix.arch }})
        runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-24.04' }}
        needs: [validate-changelog]
        strategy:
            fail-fast: false
            matrix:
                arch: [x64, arm64]
        steps:
            - name: Checkout
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Install system dependencies
              run: |
                  sudo apt-get update
                  sudo apt-get install -y cmake libpcap-dev

            - name: Setup pnpm
              uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0

            - name: Setup Node.js
              uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
              with:
                  node-version: 22
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build C++ core
              run: pnpm build:core

            - name: Generate Prisma client
              run: pnpm --filter @repo/core-node prisma generate

            - name: Build and package server
              run: pnpm -F @repo/web run package

            - name: Upload server artifact
              uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
              with:
                  name: server-${{ matrix.arch }}
                  path: apps/web/dist/*.tar.gz
                  if-no-files-found: error

    # Create GitHub Release and upload all artifacts
    release:
        name: Create Release
        runs-on: ubuntu-24.04
        needs: [validate-changelog, build-desktop, build-server]
        steps:
            - name: Download release notes
              uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
              with:
                  name: release-notes

            - name: Download all build artifacts
              uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
              with:
                  path: artifacts
                  pattern: '!(release-notes)'

            - name: List artifacts
              run: find artifacts -type f

            - name: Create Release
              uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
              with:
                  draft: false
                  prerelease: ${{ contains(github.ref, '-') }}
                  body_path: release_notes.md
                  files: |
                      artifacts/desktop-deb-x64/*.deb
                      artifacts/desktop-deb-arm64/*.deb
                      artifacts/desktop-zip-x64/*.zip
                      artifacts/desktop-zip-arm64/*.zip
                      artifacts/server-x64/*.tar.gz
                      artifacts/server-arm64/*.tar.gz
